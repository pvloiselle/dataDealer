<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DataDealer{% endblock %}</title>

    <!-- Bootstrap 5 — provides all the styling via CDN (no installation needed) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <style>
        /* ── Custom styles on top of Bootstrap ── */
        body {
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Sidebar navigation */
        .sidebar {
            min-height: 100vh;
            background-color: #1a1f36;
            padding-top: 1rem;
        }
        .sidebar .nav-link {
            color: #a0aec0;
            padding: 0.6rem 1.25rem;
            border-radius: 6px;
            margin: 2px 8px;
            font-size: 0.9rem;
            transition: background 0.15s;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background-color: #2d3561;
            color: #ffffff;
        }
        .sidebar .nav-link i {
            margin-right: 8px;
            width: 18px;
            text-align: center;
        }
        .sidebar-brand {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 0.5rem 1.25rem 1.5rem 1.25rem;
            display: block;
            text-decoration: none;
            letter-spacing: 0.02em;
        }
        .sidebar-brand span {
            color: #7c9ef8;
        }

        /* Main content area */
        .main-content {
            padding: 2rem;
        }

        /* Stat cards on the dashboard */
        .stat-card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        .stat-card .card-body {
            padding: 1.5rem;
        }
        .stat-number {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1;
        }

        /* Status badges */
        .badge-auto_fulfilled { background-color: #198754; }
        .badge-flagged        { background-color: #dc3545; }
        .badge-reviewed       { background-color: #6c757d; }
        .badge-pending        { background-color: #ffc107; color: #333; }

        /* Page header */
        .page-header {
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
        }
        .page-header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1f36;
        }

        /* Flash message positioning */
        .flash-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
            width: 380px;
        }
    </style>
</head>
<body>

<!-- Flash messages (success/error notifications) -->
<div class="flash-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show shadow-sm"
                 role="alert">
                <i class="bi bi-{{ 'check-circle-fill' if category == 'success' else 'exclamation-triangle-fill' }} me-2"></i>
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endwith %}
</div>

<div class="container-fluid p-0">
    <div class="row g-0">

        <!-- ── Sidebar navigation ── -->
        <div class="col-auto sidebar" style="width: 220px; min-width: 220px;">
            <a href="/" class="sidebar-brand">Data<span>Dealer</span></a>

            <nav class="nav flex-column">
                <a href="{{ url_for('dashboard.index') }}"
                   class="nav-link {% if request.endpoint == 'dashboard.index' %}active{% endif %}">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
                <a href="{{ url_for('dashboard.upload') }}"
                   class="nav-link {% if request.endpoint in ['dashboard.upload', 'dashboard.upload_post'] %}active{% endif %}">
                    <i class="bi bi-cloud-upload"></i> Upload Files
                </a>
                <a href="{{ url_for('dashboard.permissions_page') }}"
                   class="nav-link {% if request.endpoint == 'dashboard.permissions_page' %}active{% endif %}">
                    <i class="bi bi-shield-check"></i> Permissions
                </a>
                <a href="{{ url_for('dashboard.review') }}"
                   class="nav-link {% if request.endpoint == 'dashboard.review' %}active{% endif %}">
                    <i class="bi bi-flag"></i> Review Queue
                </a>
                <a href="{{ url_for('dashboard.log') }}"
                   class="nav-link {% if request.endpoint == 'dashboard.log' %}active{% endif %}">
                    <i class="bi bi-journal-text"></i> Request Log
                </a>
            </nav>
        </div>

        <!-- ── Main content ── -->
        <div class="col main-content">
            {% block content %}{% endblock %}
        </div>

    </div>
</div>

<!-- Bootstrap JS (needed for alert dismissal and other interactive elements) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% block scripts %}{% endblock %}
</body>
</html>
