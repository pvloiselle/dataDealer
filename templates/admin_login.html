<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — DataDealer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-feature-settings: "cv02","cv03","cv04","cv11";
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 14px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.40), 0 8px 20px rgba(0,0,0,0.25);
            background: #ffffff;
        }

        .login-brand {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.02em;
        }

        .login-brand span {
            color: #3b82f6;
        }

        .login-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(37, 99, 235, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #2563eb;
            margin: 0 auto 1rem;
        }

        .form-control {
            font-family: inherit;
            font-size: 0.875rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 0.55rem 0.875rem;
            color: #0f172a;
            background: #ffffff;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            outline: none;
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .form-label {
            font-size: 0.8125rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.4rem;
        }

        .btn-primary {
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            background: linear-gradient(180deg, #2a69ed 0%, #1d4ed8 100%);
            border-color: #1d4ed8;
            border-radius: 8px;
            padding: 0.55rem 1rem;
            box-shadow: 0 1px 3px rgba(37,99,235,0.25);
            transition: background 0.1s, box-shadow 0.1s;
        }

        .btn-primary:hover {
            background: linear-gradient(180deg, #1d4ed8 0%, #1e40af 100%);
            box-shadow: 0 2px 6px rgba(37,99,235,0.30);
        }

        .back-link {
            color: #94a3b8;
            font-size: 0.8125rem;
            text-decoration: none;
            transition: color 0.1s;
        }

        .back-link:hover {
            color: #64748b;
        }
    </style>
</head>
<body>
<div class="login-card card p-4 p-md-5">
    <div class="text-center mb-4">
        <div class="login-icon">
            <i class="bi bi-shield-lock"></i>
        </div>
        <p class="login-brand mb-1">Data<span>Dealer</span></p>
        <p style="color: #64748b; font-size: 0.8375rem; margin-bottom: 0;">Sign in to your account</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 small border-0" style="background:#fee2e2;color:#dc2626;border-radius:8px;">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('dashboard.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="next" value="{{ next_url }}">
        <div class="mb-3">
            <label class="form-label" for="email">Email address</label>
            <input type="email" id="email" name="email"
                   class="form-control" placeholder="you@yourfirm.com"
                   autofocus autocomplete="email">
        </div>
        <div class="mb-4">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password"
                   class="form-control" placeholder="Enter your password"
                   autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Sign in
        </button>
    </form>

    <div class="text-center mt-4">
        <a href="{{ url_for('dashboard.index') }}" class="back-link">
            <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
