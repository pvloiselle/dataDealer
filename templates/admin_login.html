<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — DataDealer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 380px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.10);
        }
        .login-brand {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a1f36;
        }
        .login-brand span { color: #7c9ef8; }
    </style>
</head>
<body>
<div class="login-card card p-4">
    <div class="text-center mb-4">
        <p class="login-brand mb-1">Data<span>Dealer</span></p>
        <p class="text-muted small mb-0">Admin access required</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 small">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('dashboard.admin_login') }}">
        <input type="hidden" name="next" value="{{ next_url }}">
        <div class="mb-3">
            <label class="form-label fw-medium" for="password">Admin Password</label>
            <input type="password" id="password" name="password"
                   class="form-control" placeholder="Enter admin password"
                   autofocus autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-shield-lock me-1"></i>Log in
        </button>
    </form>

    <div class="text-center mt-3">
        <a href="{{ url_for('dashboard.index') }}" class="text-muted small">
            <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
