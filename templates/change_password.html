{% extends "base.html" %}
{% block title %}Change Password — DataDealer{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="bi bi-key me-2"></i>Change Password</h1>
    <p class="text-muted mb-0">Update your account password.</p>
</div>

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4">

                {% if error %}
                <div class="alert alert-danger border-0 py-2 small" style="background:#fee2e2;color:#dc2626;border-radius:8px;">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
                </div>
                {% endif %}

                <form method="POST" action="{{ url_for('dashboard.change_own_password') }}">
                    <div class="mb-3">
                        <label class="form-label">Current Password</label>
                        <input type="password" name="current_password" class="form-control"
                               placeholder="Your current password" required autocomplete="current-password">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" name="new_password" class="form-control"
                               placeholder="At least 8 characters" minlength="8" required autocomplete="new-password">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" name="confirm_password" class="form-control"
                               placeholder="Repeat new password" minlength="8" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-lg me-1"></i>Update Password
                    </button>
                </form>

                <div class="text-center mt-3">
                    <a href="{{ url_for('dashboard.index') }}" class="text-muted small text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
